<!DOCTYPE html>
<html>
<head>
<title>Sip & Chill Cafe</title>
</head>

<body>

<h1>Sip & Chill Cafe ☕</h1>
<p>Dine In & Order Online</p>

<!-- VIDEO -->
<video controls autoplay loop muted width="300">
<source src="cafe.mp4" type="video/mp4">
</video>

<hr>

<!-- LOGIN -->
<h2>Login</h2>

<form>

<label>Name</label><br>
<input placeholder="Enter your name"><br><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email"><br><br>

<label>Password</label><br>
<input type="password" placeholder="Enter password"><br><br>

<label>Search</label><br>
<input list="items" placeholder="Search here">

<datalist id="items">
<option value="Cold Coffee">
</datalist>

<br><br>

<select>
<option>Dine In</option>
<option>Order Online</option>
</select>

<br><br>

<input type="checkbox"> Accept Terms<br><br>


</form>

<hr>

<!-- MENU -->
<h2>Menu</h2>

<h3>Cold Coffee ☕</h3>

<img src="caffee.png" width="250">

<p>Price: ₹80</p>

<p><strong>Refreshing</strong> and <em>Tasty</em> drink</p>

<hr>

<!-- ORDER -->
<h2>Order Now</h2>

<form>

<label>Name</label><br>
<input placeholder="Enter your name"><br><br>

<label>Quantity</label><br>
<input type="number" placeholder="Enter quantity"><br><br>

<label>Date</label><br>
<input type="date"><br><br>

<textarea placeholder="Any message"></textarea><br><br>

<input type="checkbox"> Confirm Order<br><br>

<button>Order</button>

</form>

<hr>

<!-- FEEDBACK -->
<h2>Feedback</h2>

<form>

<input placeholder="Name"><br><br>
<input type="email" placeholder="Email"><br><br>

<textarea placeholder="Write feedback"></textarea><br><br>

<input type="checkbox"> Accept Terms<br><br>

<button>Submit</button>

</form>

<ul>
<li>Good Service</li>
<li>Fast Delivery</li>
<li>Best Cafe</li>
</ul>

</body>
</html>
