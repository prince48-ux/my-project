<!DOCTYPE html>
<html>
<head>
<title>Sip & Chill Cafe</title>
</head>

<body>

<h1>Sip & Chill Cafe ☕</h1>
<p>Dine In & Order Online</p>

<video controls autoplay loop muted width="300">
<source src="cafe.mp4" type="video/mp4">
</video>

<h2>Login</h2>

<form action="menu.html">

<label>Name</label><br>
<input placeholder="Enter your name" required><br>

<label>Email</label><br>
<input type="email" placeholder="Enter your email" required><br>

<label>Password</label><br>
<input type="password" placeholder="Enter password" required><br>

<label>Search</label><br>
<input list="items" placeholder="Search here">

<datalist id="items">
<option value="Coffee">
<option value="Burger">
<option value="Pizza">
<option value="Gaming">
</datalist>

<br>

<select>
<option>Dine In</option>
<option>Order Online</option>
</select>

<br>

<input type="checkbox"> Accept Terms<br>

<button type="submit">Login</button>

</form>

</body>
</html>
